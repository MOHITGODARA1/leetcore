<!doctype html>
<html lang="en">

<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title (VERY IMPORTANT for SEO) -->
  <title>LeetCore - Practice DSA & Track Coding Progress</title>

  <!-- Meta Description -->
  <meta name="description"
    content="LeetCore is a modern platform to practice Data Structures & Algorithms, track your coding progress, and improve problem-solving skills." />

  <!-- Keywords -->
  <meta name="keywords"
    content="DSA, coding practice, algorithms, data structures, programming, LeetCode alternative, coding tracker" />

  <!-- Author -->
  <meta name="author" content="Mohit Godara" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/leetcorelogo.png" />

  <!-- Open Graph (Facebook, LinkedIn) -->
  <meta property="og:title" content="LeetCore - Practice DSA & Track Coding Progress" />
  <meta property="og:description"
    content="Practice coding, improve problem solving, and track your progress with LeetCore." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourdomain.com" />
  <meta property="og:image" content="https://yourdomain.com/preview.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LeetCore - Practice DSA & Track Coding Progress" />
  <meta name="twitter:description" content="Improve your coding skills with LeetCore." />
  <meta name="twitter:image" content="https://yourdomain.com/preview.png" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://yourdomain.com/" />

  <!-- Preconnect (Performance Boost) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- JSON-LD Structured Data (ADVANCED SEO) -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "LeetCore",
        "url": "https://yourdomain.com",
        "description": "Platform to practice DSA and track coding progress.",
        "author": {
          "@type": "Person",
          "name": "Mohit Godara"
        }
      }
    </script>
</head>

<body>
  <!-- No-JS fallback (IMPORTANT for SEO) -->
  <noscript>
    LeetCore is a coding platform to practice DSA and improve problem-solving skills.
  </noscript>

  <div id="root"></div>

  <!-- Main Script -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
